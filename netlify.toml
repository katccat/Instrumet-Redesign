# Netlify deploy config for the static Astro build.
# The Astro adapter is not required for a fully static site: `astro build`
# emits plain HTML/CSS/JS into `dist/`, which Netlify serves directly.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Long-cache the fingerprinted asset bundle Astro emits under /_astro/.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Self-hosted font files are content-hashed too; cache them hard.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
