backend:
  name: git-gateway
  branch: main

# Uploaded images land in public/images/uploads and are referenced by the
# root-absolute path the site already uses for /images/...
media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: posts
    label: Articles
    folder: src/content/posts
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { name: title, label: Title, widget: string }
      - { name: description, label: Description, widget: text, required: false }
      - { name: pubDate, label: Publish Date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { name: updatedDate, label: Updated Date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { name: heroImage, label: Hero Image, widget: image, required: false }
      - { name: videoUrl, label: Video URL, widget: string, required: false, hint: "YouTube link — set this for video posts (no body needed)" }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - { name: tags, label: Tags, widget: list, required: false }
      - { name: body, label: Body, widget: markdown, required: false }

  - name: products
    label: Products
    folder: src/content/products
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { name: name, label: Name, widget: string }
      - { name: category, label: Category, widget: select, options: ["Load Cells", "Grips & Fixtures", "Load Frames"] }
      - { name: summary, label: Summary, widget: text }
      - { name: image, label: Image, widget: image, required: false }
      - { name: order, label: Order, widget: number, default: 0, value_type: int }
      - { name: body, label: Body, widget: markdown, required: false }
